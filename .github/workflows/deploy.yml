name: publish-docs
on:
  push:
    branches:
      - main

# Permisos necesarios para el despliegue directo
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que múltiples despliegues choquen entre sí
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build documentation
        run: mkdocs build  # Solo compila, no empuja a ninguna rama

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/  # MkDocs genera el sitio en esta carpeta por defecto

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
